databases:
  - name: logistics-auction-db
    plan: free
    databaseName: logistics_auction
    user: logi_user

services:
  - type: web
    name: logistics-auction
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps --include=dev && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: logistics-auction-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://logistics-auction.onrender.com
