<div class="auth-page">
  <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="card auth-card shadow-lg" style="max-width:520px;width:100%">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="brand-icon mb-2">{{ role === 'customer' ? '📦' : '🚛' }}</div>
          <h2 class="fw-bold">Register as {{ role === 'customer' ? 'Customer' : 'Logistics Partner' }}</h2>
          <p class="text-muted">Create your account</p>
        </div>

        @if (error()) {
          <div class="alert alert-danger">{{ error() }}</div>
        }

        <form (ngSubmit)="submit()">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-semibold">Full Name</label>
              <input class="form-control" [(ngModel)]="form.name" name="name" required placeholder="John Doe">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" class="form-control" [(ngModel)]="form.email" name="email" required placeholder="you@example.com">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Phone</label>
              <input class="form-control" [(ngModel)]="form.phone" name="phone" placeholder="+91 9876543210">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" class="form-control" [(ngModel)]="form.password" name="password" required placeholder="Min 8 characters">
            </div>

            @if (role === 'partner') {
              <div class="col-12"><hr><h6 class="text-success fw-bold">🚛 Truck Information</h6></div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Truck Type</label>
                <select class="form-select" [(ngModel)]="form.truckType" name="truckType" required>
                  <option value="">Select type</option>
                  <option>Mini Truck</option>
                  <option>Medium Truck</option>
                  <option>Heavy Truck</option>
                  <option>Container Truck</option>
                  <option>Refrigerated Truck</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Capacity (tons)</label>
                <input type="number" class="form-control" [(ngModel)]="form.truckCapacity" name="truckCapacity" required placeholder="5">
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">License Plate</label>
                <input class="form-control" [(ngModel)]="form.licensePlate" name="licensePlate" required placeholder="MH 01 AB 1234">
              </div>
            }
          </div>

          <button type="submit" class="btn w-100 mt-4 btn-lg" [class.btn-primary]="role === 'customer'" [class.btn-success]="role === 'partner'" [disabled]="loading()">
            @if (loading()) { <span class="spinner-border spinner-border-sm me-2"></span> }
            Create Account
          </button>
        </form>

        <div class="text-center mt-3">
          <small class="text-muted">Already have an account? <a routerLink="/login">Sign in</a></small>
        </div>
      </div>
    </div>
  </div>
</div>
