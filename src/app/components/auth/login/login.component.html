<div class="auth-page">
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card auth-card shadow-lg">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="brand-icon mb-3">🚛</div>
          <h2 class="fw-bold">LogiAuction</h2>
          <p class="text-muted">Sign in to your account</p>
        </div>

        @if (error()) {
          <div class="alert alert-danger">{{ error() }}</div>
        }

        <form (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control form-control-lg" [(ngModel)]="email" name="email" required placeholder="you@example.com">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control form-control-lg" [(ngModel)]="password" name="password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100" [disabled]="loading()">
            @if (loading()) { <span class="spinner-border spinner-border-sm me-2"></span> }
            Sign In
          </button>
        </form>

        <hr class="my-4">
        <div class="text-center">
          <p class="mb-2 text-muted">Don't have an account?</p>
          <a routerLink="/register/customer" class="btn btn-outline-primary me-2">Register as Customer</a>
          <a routerLink="/register/partner" class="btn btn-outline-success">Register as Partner</a>
        </div>
      </div>
    </div>
  </div>
</div>
